<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2f20d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#222210",
                        "poke-red": "#ff1f1f",
                        "poke-blue": "#3b4cca",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<div class="w-full max-w-[430px] min-h-screen flex flex-col bg-background-light dark:bg-background-dark shadow-xl">
<!-- Header -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 sticky top-0 z-10">
<button class="flex size-12 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Pokemon Quiz</h2>
</header>
<!-- Progress Section -->
<section class="flex flex-col gap-3 p-6 pt-2">
<div class="flex justify-between items-end">
<span class="text-slate-900 dark:text-slate-100 text-base font-bold">Progress</span>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium">Question 3 of 7</span>
</div>
<div class="h-3 w-full rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden border border-slate-300 dark:border-slate-700">
<div class="h-full rounded-full bg-primary" style="width: 43%;"></div>
</div>
</section>
<!-- Question Title -->
<main class="flex-1 flex flex-col">
<div class="px-6 py-4">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight">
                    How do you usually spend your weekends?
                </h1>
</div>
<!-- Answer Options Grid -->
<div class="grid grid-cols-2 gap-4 p-6">
<!-- Option 1 -->
<button class="group flex flex-col gap-3 p-4 bg-white dark:bg-slate-900 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all text-left">
<div class="w-full aspect-square bg-blue-100 dark:bg-blue-900/30 rounded-lg flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-5xl text-blue-500 group-hover:scale-110 transition-transform">bed</span>
</div>
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">Sleeping in</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Resting like a Snorlax</p>
</div>
</button>
<!-- Option 2 -->
<button class="group flex flex-col gap-3 p-4 bg-white dark:bg-slate-900 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all text-left">
<div class="w-full aspect-square bg-green-100 dark:bg-green-900/30 rounded-lg flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-5xl text-green-600 group-hover:scale-110 transition-transform">hiking</span>
</div>
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">Exploring nature</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Hiking through tall grass</p>
</div>
</button>
<!-- Option 3 -->
<button class="group flex flex-col gap-3 p-4 bg-white dark:bg-slate-900 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all text-left">
<div class="w-full aspect-square bg-orange-100 dark:bg-orange-900/30 rounded-lg flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-5xl text-orange-500 group-hover:scale-110 transition-transform">group</span>
</div>
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">Socializing</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Hanging with friends</p>
</div>
</button>
<!-- Option 4 -->
<button class="group flex flex-col gap-3 p-4 bg-white dark:bg-slate-900 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all text-left">
<div class="w-full aspect-square bg-red-100 dark:bg-red-900/30 rounded-lg flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-5xl text-poke-red group-hover:scale-110 transition-transform">exercise</span>
</div>
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">Training hard</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Leveling up your skills</p>
</div>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-4 pb-8 flex justify-around items-center">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
<span class="text-[10px] font-bold">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">emoji_events</span>
<span class="text-[10px] font-bold">Leaderboard</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Profile</span>
</a>
</nav>
</div>
</body></html>
