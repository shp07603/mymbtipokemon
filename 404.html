<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Pokemon MBTI Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f8f5;
            color: #2d2416;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 4rem; margin-bottom: 1rem; color: #ff6b35; }
        p { font-size: 1.2rem; margin-bottom: 2rem; }
        a {
            background-color: #f2f20d;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
        }
        a:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! The Pokemon you're looking for has fled into the tall grass.</p>
    <a href="/">Go Back Home</a>
</body>
</html>
